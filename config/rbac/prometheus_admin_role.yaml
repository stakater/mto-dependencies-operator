# This rule is not used by the project mto-dependencies-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over dependencies.tenantoperator.stakater.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mto-dependencies-operator
    app.kubernetes.io/managed-by: kustomize
  name: prometheus-admin-role
rules:
- apiGroups:
  - dependencies.tenantoperator.stakater.com
  resources:
  - prometheuses
  verbs:
  - '*'
- apiGroups:
  - dependencies.tenantoperator.stakater.com
  resources:
  - prometheuses/status
  verbs:
  - get
