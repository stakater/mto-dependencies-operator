apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
  ##
  ## Base operator rules
  ##
  # We need to get namespaces so the operator can read namespaces to ensure they exist
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
  # We need to manage Helm release secrets
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - "*"
  # We need to create events on CRs about things happening during reconciliation
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
  # We need to manage CustomResourceDefinitions
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  ##
  ## Rules for dependencies.tenantoperator.stakater.com/v1alpha1, Kind: Dex
  ##
  - apiGroups:
      - dependencies.tenantoperator.stakater.com
    resources:
      - dexes
      - dexes/status
      - dexes/finalizers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - verbs:
      - "*"
    apiGroups:
      - "rbac.authorization.k8s.io"
    resources:
      - "clusterrolebindings"
      - "clusterroles"
  - verbs:
      - "*"
    apiGroups:
      - ""
    resources:
      - "secrets"
      - "serviceaccounts"
      - "services"
  - verbs:
      - "*"
    apiGroups:
      - "rbac.authorization.k8s.io"
    resources:
      - "rolebindings"
      - "roles"
  - verbs:
      - "*"
    apiGroups:
      - "apps"
    resources:
      - "deployments"

