apiVersion: dependencies.tenantoperator.stakater.com/v1alpha1
kind: DexConfigOperator
metadata:
  name: dexconfigoperator-sample
spec:
  # Default values copied from <project_dir>/helm-charts/dex-config-operator/values.yaml
  controllerManager:
    manager:
      args:
      - --metrics-bind-address=:8443
      - --leader-elect
      - --health-probe-bind-address=:8081
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
      env:
        dexNamespace: dex
      image:
        repository: ghcr.io/stakater/public/dex-config-operator
        tag: v0.0.1
      resources:
        limits:
          cpu: 500m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 64Mi
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    replicas: 1
    serviceAccount:
      annotations: {}
  kubernetesClusterDomain: cluster.local
  metricsService:
    ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
    type: ClusterIP
  
  
