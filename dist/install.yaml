apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: mto-dependencies-operator
    control-plane: controller-manager
  name: mto-dependencies-operator-metrics
  namespace: mto-dependencies-operator-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: mto-dependencies-operator
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: mto-dependencies-operator
    control-plane: controller-manager
  name: mto-dependencies-operator-controller-manager
  namespace: mto-dependencies-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mto-dependencies-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: mto-dependencies-operator
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-require-rbac
        - --metrics-secure
        - --metrics-bind-address=:8443
        - --leader-elect
        - --leader-election-id=mto-dependencies-operator
        - --health-probe-bind-address=:8081
        image: ghcr.io/stakater/mto-dependencies-operator:v0.0.2
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts: []
      imagePullSecrets:
      - name: saap-dockerconfigjson
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: mto-dependencies-operator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
