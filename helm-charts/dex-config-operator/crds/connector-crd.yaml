apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: connectors.auth.stakater.com
spec:
  group: auth.stakater.com
  names:
    kind: Connector
    listKind: ConnectorList
    plural: connectors
    singular: connector
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Connector is the Schema for the connectors API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConnectorSpec defines the desired state of Connector.
            properties:
              configSecretRef:
                description: |-
                  ConfigSecretRef references a secret containing the connector configuration
                  The secret should contain a key (default: "config") with the complete
                  connector configuration as base64-encoded JSON. This allows for
                  complex configurations including arrays and nested objects.
                properties:
                  key:
                    description: |-
                      Key within the secret that contains the data. If empty, defaults to "config"
                      The data should be base64-encoded JSON that will be unmarshaled
                    type: string
                  name:
                    description: Name of the secret
                    type: string
                  namespace:
                    description: Namespace of the secret. If empty, defaults to the
                      namespace of the CR
                    type: string
                required:
                - name
                type: object
              enabled:
                default: true
                description: Enabled determines if this connector should be included
                  in the dex configuration
                type: boolean
              id:
                description: ID is a unique identifier for this connector
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              name:
                description: Name is the display name for this connector
                type: string
              type:
                description: Type specifies the connector type (oidc, google, saml,
                  etc.)
                enum:
                - oidc
                - google
                - saml
                - ldap
                - github
                - gitlab
                - bitbucket
                - microsoft
                type: string
            required:
            - configSecretRef
            - id
            - name
            - type
            type: object
          status:
            description: ConnectorStatus defines the observed state of Connector.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the connector's current state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastUpdated:
                description: LastUpdated is the timestamp when the connector status
                  was last updated
                format: date-time
                type: string
              message:
                description: Message provides human-readable details about the current
                  state
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation of the most
                  recently observed Connector
                format: int64
                type: integer
              phase:
                description: Phase represents the current phase of the connector
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

