apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dex-config-operator.fullname" . }}-manager-role
  labels:
  {{- include "dex-config-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - patch
  - update
  - watch
  - delete
- apiGroups:
  - auth.stakater.com
  resources:
  - clients
  - connectors
  - dexconfigs
  - localusers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - auth.stakater.com
  resources:
  - clients/finalizers
  - connectors/finalizers
  - dexconfigs/finalizers
  - localusers/finalizers
  verbs:
  - update
- apiGroups:
  - auth.stakater.com
  resources:
  - clients/status
  - connectors/status
  - dexconfigs/status
  - localusers/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dex-config-operator.fullname" . }}-manager-rolebinding
  labels:
  {{- include "dex-config-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "dex-config-operator.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "dex-config-operator.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
