              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PriceBookSpec defines the desired state of PriceBook
            properties:
              currency:
                description: The base currency for financial reporting and calculations
                  (e.g., EUR, USD).
                pattern: ^[A-Z]{3}$
                type: string
              rates:
                description: Rates used for valuation in 'currency' mode. Defines
                  cost per unit of resource. Required if valuationMode is 'currency'.
                properties:
                  cpuHour:
                    description: Cost per vCPU-hour (e.g., 0.031).
                    type: string
                  gpuHour:
                    description: Cost per GPU-hour (e.g., 1.8).
                    type: string
                  networkGiB:
                    description: Cost per GiB of network data transferred (e.g., 0.09).
                    type: string
                  pvGbHour:
                    description: Cost per GB-hour of Persistent Volume (e.g., 0.00012).
                    type: string
                  ramGbHour:
                    description: Cost per GB-hour of RAM (e.g., 0.004).
                    type: string
                  spotCPUHour:
                    description: Cost per vCPU-hour (e.g., 0.031).
                    type: string
                  spotRAMGbHour:
                    description: Cost per GB-hour of spotRAM (e.g., 0.004).
                    type: string
