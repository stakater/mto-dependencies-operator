apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: subscriptions.finops.stakater.com
spec:
  group: finops.stakater.com
  names:
    kind: Subscription
    listKind: SubscriptionList
    plural: subscriptions
    singular: subscription
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Subscription is the Schema for the subscriptions API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SubscriptionSpec defines the desired state of Subscription.
              A Subscription creates a binding to an Offering, starting the clock and instantiating the offering.
              Effectively it starts consuming the cost-driving entity from a billing perspective.
            properties:
              lifecycle:
                description: |-
                  Lifecycle allows overriding lifecycle behavior if the Offering permits it.
                  If both parent and targetRef are set:
                  - activation requires BOTH (parent active AND target Ready)
                  - deactivation happens if EITHER stops applying, except parent deactivation is ignored when onParentDeactivate=Orphan
                properties:
                  onParentDeactivate:
                    default: Deactivate
                    description: |-
                      OnParentDeactivate controls what happens when the parent subscription deactivates:
                      - Deactivate: this subscription also deactivates.
                      - Orphan: this subscription stays active independently, while retaining the parent reference for traceability.
                    enum:
                    - Deactivate
                    - Orphan
                    type: string
                  targetRef:
                    description: |-
                      TargetRef ties the lifecycle of the subscription to a target resource.
                      The subscription will not activate until the target status is Ready.
                      When the target is deleted, the subscription will be deactivated.
                    properties:
                      apiVersion:
                        description: APIVersion is the API version of the target resource.
                        type: string
                      kind:
                        description: Kind is the kind of the target resource.
                        type: string
                      name:
                        description: Name is the name of the target resource.
                        type: string
                      namespace:
                        description: Namespace is the namespace of the target resource.
                        type: string
                    type: object
                type: object
              offeringRef:
                description: OfferingRef is the reference to the Offering which is
                  being subscribed to.
                properties:
                  name:
                    type: string
                  namespace:
                    description: Namespace of the Offering. If empty, defaults to
                      the Subscription's namespace.
                    type: string
                required:
                - name
                type: object
              parent:
                description: |-
                  Parent is an optional reference to a parent subscription for traceability.
                  For example, a storage subscription attached to a VM would reference the VM subscription.
                properties:
                  subscriptionRef:
                    description: SubscriptionRef is a reference to the parent subscription.
                    properties:
                      name:
                        type: string
                      namespace:
                        description: Namespace of the Offering. If empty, defaults
                          to the Subscription's namespace.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - subscriptionRef
                type: object
            required:
            - offeringRef
            type: object
          status:
            description: |-
              SubscriptionStatus defines the observed state of Subscription.
              Non-active subscriptions are ignored by scrape jobs.
              A subscription becomes active when:
              - parent.SubscriptionRef is set and the parent is active, and/or
              - targetRef is set and the target is Ready.
              Unset references are ignored. If neither reference is set, the subscription activates after spec validation.
            properties:
              activatedAt:
                description: ActivatedAt is the time when the subscription became
                  active.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the Subscription's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              costs:
                description: "Costs contains rolling cost summaries for the current
                  hour, day, and month.\nWhen populated, contains exactly 3 entries
                  — one per granularity.\t// +optional"
                items:
                  properties:
                    breakdown:
                      description: Breakdown contains the cost breakdown by component.
                      items:
                        properties:
                          current:
                            description: Current is the current accumulated value
                              in micro-currency units.
                            format: int64
                            type: integer
                          name:
                            description: Name is the name of the cost metric (e.g.,
                              "cpuHour", "pvcGbHour").
                            enum:
                            - subscription
                            - cpuHour
                            - gpuHour
                            - ramGbHour
                            - pvcGbHour
                            - networkIngressGbHour
                            - networkEgressGbHour
                            type: string
                          projected:
                            description: Projected is the projected value in micro-currency
                              units.
                            format: int64
                            type: integer
                        required:
                        - name
                        type: object
                      type: array
                    current:
                      description: Current is the current accumulated spend for the
                        period in micro-currency units.
                      format: int64
                      type: integer
                    endExclusive:
                      description: EndExclusive is the end time of the bucket (exclusive).
                      format: date-time
                      type: string
                    granularity:
                      description: Granularity is the time granularity of this bucket
                        (e.g., hour, day, month).
                      enum:
                      - hour
                      - day
                      - month
                      type: string
                    projected:
                      description: Projected is the projected spend for the full period
                        cycle in micro-currency units.
                      format: int64
                      type: integer
                    start:
                      description: Start is the start time of the bucket (inclusive).
                      format: date-time
                      type: string
                  required:
                  - granularity
                  type: object
                type: array
              deactivatedAt:
                description: DeactivatedAt is the time when the subscription was deactivated.
                format: date-time
                type: string
              ready:
                description: Ready indicates whether the subscription is active and
                  ready.
                type: string
            required:
            - ready
            type: object
        type: object
    selectableFields:
    - jsonPath: .status.ready
    served: true
    storage: true
    subresources:
      status: {}

