apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: finops-operator-costjob-admin-role
  labels:
  {{- include "finops-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - finops.stakater.com
  resources:
  - costjobs
  verbs:
  - '*'
- apiGroups:
  - finops.stakater.com
  resources:
  - costjobs/status
  verbs:
  - get
