{{- if .Values.finopsGatewayIngress.enabled -}}
{{- $fullName := include "finops-operator.fullname" . -}}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "finops-operator.labels" . | nindent 4 }}
  {{- with .Values.finopsGatewayIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.finopsGatewayIngress.className }}
  ingressClassName: {{ .Values.finopsGatewayIngress.className }}
  {{- end }}
  {{- if .Values.finopsGatewayIngress.tls }}
  tls:
    {{- range .Values.finopsGatewayIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ tpl . $ | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  {{ if .Values.finopsGatewayIngress.rules }}
  rules:
  {{- .Values.finopsGatewayIngress.rules | toYaml | nindent 2 }}
  {{- else }}
  {{- end }}
{{- end }}