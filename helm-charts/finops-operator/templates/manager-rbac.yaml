apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: finops-operator-manager-role
  labels:
  {{- include "finops-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dependencies.tenantoperator.stakater.com
  resources:
  - opencosts
  verbs:
  - get
  - list
  - patch
- apiGroups:
  - finops.stakater.com
  resources:
  - costjobs
  - finopsproviders
  - pricebooks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - finops.stakater.com
  resources:
  - costjobs/finalizers
  - pricebooks/finalizers
  verbs:
  - update
- apiGroups:
  - finops.stakater.com
  resources:
  - costjobs/status
  - finopsproviders/status
  - pricebooks/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: finops-operator-manager-rolebinding
  labels:
  {{- include "finops-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: finops-operator-manager-role
subjects:
- kind: ServiceAccount
  name: finops-operator-controller-manager
  namespace: '{{ .Release.Namespace }}'
