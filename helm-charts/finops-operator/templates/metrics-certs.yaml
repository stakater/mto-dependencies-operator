apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "finops-operator.fullname" . }}-metrics-certs
  labels:
  {{- include "finops-operator.labels" . | nindent 4 }}
spec:
  dnsNames:
  - 'finops-operator-controller-manager-metrics-service.{{ .Release.Namespace }}.svc'
  - 'finops-operator-controller-manager-metrics-service.{{ .Release.Namespace }}.svc.{{
    .Values.kubernetesClusterDomain }}'
  issuerRef:
    kind: Issuer
    name: {{ include "finops-operator.fullname" . }}-selfsigned-issuer
  secretName: metrics-server-cert
