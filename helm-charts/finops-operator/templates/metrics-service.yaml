apiVersion: v1
kind: Service
metadata:
  name: finops-operator-controller-manager-metrics-service
  labels:
    control-plane: controller-manager
  {{- include "finops-operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metricsService.type }}
  selector:
    app.kubernetes.io/name: finops-operator
    control-plane: controller-manager
    {{- include "finops-operator.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.metricsService.ports | toYaml | nindent 2 }}
