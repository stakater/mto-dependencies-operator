apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: finops-operator-pricebook-viewer-role
  labels:
  {{- include "finops-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - finops.stakater.com
  resources:
  - pricebooks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - finops.stakater.com
  resources:
  - pricebooks/status
  verbs:
  - get
