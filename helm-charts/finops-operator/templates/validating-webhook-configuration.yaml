apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "finops-operator.fullname" . }}-validating-webhook-configuration
  annotations:
    {{- if .Values.certManager.enabled }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "finops-operator.fullname" . }}-serving-cert
    {{- end }}
    {{- if .Values.openshift.enabled }}
    service.beta.openshift.io/inject-cabundle: "true"
    {{- end }}
  labels:
  {{- include "finops-operator.labels" . | nindent 4 }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: finops-operator-webhook-service
      namespace: '{{ .Release.Namespace }}'
      path: /validate-finops-stakater-com-v1alpha1-offering
  failurePolicy: Fail
  name: voffering-v1alpha1.kb.io
  rules:
  - apiGroups:
    - finops.stakater.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - offerings
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: finops-operator-webhook-service
      namespace: '{{ .Release.Namespace }}'
      path: /validate-finops-stakater-com-v1alpha1-subscription
  failurePolicy: Fail
  name: vsubscription-v1alpha1.kb.io
  rules:
  - apiGroups:
    - finops.stakater.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    resources:
    - subscriptions
  sideEffects: None
