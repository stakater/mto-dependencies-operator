apiVersion: v1
kind: Service
metadata:
  name: finops-operator-webhook-service
  labels:
  {{- include "finops-operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webhookService.type }}
  selector:
    app.kubernetes.io/name: finops-operator
    control-plane: controller-manager
    {{- include "finops-operator.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.webhookService.ports | toYaml | nindent 2 }}
