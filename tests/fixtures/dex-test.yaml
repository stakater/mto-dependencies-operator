apiVersion: dependencies.tenantoperator.stakater.com/v1alpha1
kind: Dex
metadata:
  name: dex-test
spec:
  replicaCount: 1
  service:
    type: ClusterIP
    ports:
      http:
        port: 5556
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  config:
    issuer: http://dex-test:5556
    storage:
      type: memory
    web:
      http: 0.0.0.0:5556
    connectors:
    - type: mockCallback
      id: mock
      name: Example
    staticClients:
    - id: example-app
      redirectURIs:
      - 'http://127.0.0.1:5555/callback'
      name: 'Example App'
      secret: ZXhhbXBsZS1hcHAtc2VjcmV0
    staticPasswords:
    - email: "admin@example.com"
      username: "admin"
      userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
      hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"  # password: hello
    enablePasswordDB: true