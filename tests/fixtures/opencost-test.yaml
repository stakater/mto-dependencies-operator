apiVersion: dependencies.tenantoperator.stakater.com/v1alpha1
kind: OpenCost
metadata:
  name: opencost-test
spec:
  opencost:
    exporter:
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
      persistence:
        enabled: false
      cloudProviderApiKey: ""
      defaultClusterId: "default-cluster"
    ui:
      enabled: true
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
  service:
    type: ClusterIP
    port: 9003
  serviceMonitor:
    enabled: false
  ingress:
    enabled: false